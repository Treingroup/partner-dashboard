<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --text: #1a1a18;
    --text-muted: #6b6a66;
    --border: rgba(0,0,0,0.10);
    --accent: #1a1a18;
    --accent-light: #f0ede8;
    --green: #2d6a4f;
    --green-bg: #eaf3de;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1c;
      --surface2: #2a2a27;
      --text: #f0ede8;
      --text-muted: #9a9893;
      --border: rgba(255,255,255,0.10);
      --accent: #f0ede8;
      --accent-light: #2a2a27;
      --green: #9FE1CB;
      --green-bg: #085041;
    }
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    background: var(--surface);
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-left p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'Courier New', monospace;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
    display: inline-block;
    margin-right: 6px;
  }
  .status-dot.live { background: #2d6a4f; }

  .setup-card {
    max-width: 560px;
    margin: 3rem auto;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
  }

  .setup-card h2 {
    font-size: 18px;
    font-weight: 400;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .setup-card p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    font-family: 'Courier New', monospace;
    line-height: 1.6;
  }

  .field { margin-bottom: 1rem; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--text-muted);
  }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Georgia', serif;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    background: #fcebeb;
    color: #a32d2d;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    margin-top: 1rem;
    display: none;
  }

  .dashboard { display: none; padding: 2rem 2.5rem; }

  .period-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .period-btn {
    padding: 6px 14px;
    border: 0.5px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    transition: all 0.15s;
  }
  .period-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .product-badge {
    margin-left: auto;
    padding: 4px 12px;
    background: var(--surface2);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .metric-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }

  .metric-label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .metric-value {
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .metric-card.highlight .metric-value {
    color: var(--green);
  }

  .metric-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'Courier New', monospace;
  }

  .chart-section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .chart-title {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 1rem;
  }

  .table-section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .table-header {
    padding: 1rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    padding: 10px 1.25rem;
    text-align: left;
    font-weight: 400;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 0.5px solid var(--border);
  }

  td {
    padding: 12px 1.25rem;
    border-bottom: 0.5px solid var(--border);
    color: var(--text);
    font-family: 'Courier New', monospace;
  }

  tr:last-child td { border-bottom: none; }

  .badge-success {
    display: inline-block;
    padding: 2px 8px;
    background: var(--green-bg);
    color: var(--green);
    border-radius: 4px;
    font-size: 11px;
  }

  .badge-warn {
    display: inline-block;
    padding: 2px 8px;
    background: #faeeda;
    color: #854f0b;
    border-radius: 4px;
    font-size: 11px;
  }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    font-size: 14px;
  }

  .loading::after {
    content: '';
    display: block;
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    margin: 1rem auto 0;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .reset-btn {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
  }
  .reset-btn:hover { border-color: var(--text-muted); }

  .watermark {
    text-align: center;
    padding: 2rem;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Partner Dashboard</h1>
    <p id="header-sub">— configura l'accesso per iniziare</p>
  </div>
  <button class="reset-btn" id="reset-btn" style="display:none" onclick="resetConfig()">↩ riconfigura</button>
</div>

<div id="setup-section">
  <div class="setup-card">
    <h2>Configurazione accesso</h2>
    <p>Inserisci la Restricted API Key di Stripe (sola lettura) e il Product ID o Price ID del prodotto da monitorare.</p>

    <div class="field">
      <label>Stripe Restricted API Key</label>
      <input type="password" id="api-key" placeholder="rk_live_..." autocomplete="off" />
    </div>

    <div class="field">
      <label>Product ID o Price ID</label>
      <input type="text" id="product-id" placeholder="prod_... oppure price_..." />
    </div>

    <div class="field">
      <label>Quota partner (%)</label>
      <input type="number" id="quota-pct" value="20" min="1" max="100" />
    </div>

    <div class="field">
      <label>Nome prodotto (etichetta)</label>
      <input type="text" id="product-label" placeholder="es. Corso Premium" />
    </div>

    <button class="btn-primary" id="load-btn" onclick="loadData()">Carica dati →</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<div class="dashboard" id="dashboard-section">
  <div class="period-bar">
    <button class="period-btn active" onclick="setPeriod(30, this)">30 giorni</button>
    <button class="period-btn" onclick="setPeriod(90, this)">90 giorni</button>
    <button class="period-btn" onclick="setPeriod(180, this)">6 mesi</button>
    <button class="period-btn" onclick="setPeriod(365, this)">12 mesi</button>
    <span class="product-badge" id="product-badge">—</span>
  </div>

  <div id="dashboard-content"></div>
</div>

<div class="watermark">Partner Dashboard — dati in tempo reale da Stripe</div>

<script>
let CONFIG = {};
let allCharges = [];
let chartInstance = null;
let currentDays = 30;

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

async function stripeGet(path) {
  const url = `https://api.stripe.com/v1/${path}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `Bearer ${CONFIG.apiKey}` }
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

async function fetchAllCharges() {
  let charges = [];
  let params = 'limit=100&expand[]=data.payment_intent';
  let hasMore = true;
  let startingAfter = null;

  while (hasMore) {
    const q = startingAfter ? `${params}&starting_after=${startingAfter}` : params;
    const data = await stripeGet(`charges?${q}`);
    charges = charges.concat(data.data);
    hasMore = data.has_more;
    if (hasMore && data.data.length > 0) {
      startingAfter = data.data[data.data.length - 1].id;
    }
    if (charges.length > 2000) break;
  }
  return charges;
}

async function fetchProductPrices(productId) {
  if (productId.startsWith('price_')) return [productId];
  const data = await stripeGet(`prices?product=${productId}&limit=100`);
  return data.data.map(p => p.id);
}

async function fetchLineItemsForCharge(chargeId) {
  try {
    const charge = await stripeGet(`charges/${chargeId}?expand[]=invoice`);
    if (charge.invoice && charge.invoice.lines) {
      return charge.invoice.lines.data.map(l => l.price?.id).filter(Boolean);
    }
  } catch(e) {}
  return [];
}

async function loadData() {
  hideError();
  const apiKey = document.getElementById('api-key').value.trim();
  const productId = document.getElementById('product-id').value.trim();
  const quotaPct = parseFloat(document.getElementById('quota-pct').value) || 20;
  const productLabel = document.getElementById('product-label').value.trim() || productId;

  if (!apiKey || !productId) {
    showError('Inserisci sia la API Key che il Product ID.');
    return;
  }

  CONFIG = { apiKey, productId, quotaPct, productLabel };

  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  btn.textContent = 'Caricamento...';

  try {
    const priceIds = await fetchProductPrices(productId);
    if (priceIds.length === 0) throw new Error('Nessun prezzo trovato per questo prodotto.');

    const rawCharges = await fetchAllCharges();

    const filtered = [];
    for (const charge of rawCharges) {
      if (charge.status !== 'succeeded') continue;
      const lineItemPrices = await fetchLineItemsForCharge(charge.id);
      const match = lineItemPrices.some(pid => priceIds.includes(pid));
      if (match) filtered.push(charge);
      else {
        const meta = charge.metadata || {};
        const metaMatch = Object.values(meta).some(v => priceIds.includes(v) || v === productId);
        if (metaMatch) filtered.push(charge);
      }
    }

    allCharges = filtered;
    CONFIG.currency = filtered.length > 0 ? filtered[0].currency.toUpperCase() : 'EUR';

    document.getElementById('setup-section').style.display = 'none';
    document.getElementById('dashboard-section').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('product-badge').textContent = productLabel;
    document.getElementById('header-sub').textContent = `— ${productLabel}`;

    renderDashboard(currentDays);

  } catch(e) {
    showError('Errore: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Carica dati →';
  }
}

function filterByDays(charges, days) {
  const cutoff = Date.now() / 1000 - days * 86400;
  return charges.filter(c => c.created >= cutoff);
}

function formatAmount(cents, currency) {
  return new Intl.NumberFormat('it-IT', { style: 'currency', currency: currency || CONFIG.currency || 'EUR' }).format(cents / 100);
}

function formatDate(ts) {
  return new Date(ts * 1000).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function groupByMonth(charges) {
  const map = {};
  charges.forEach(c => {
    const d = new Date(c.created * 1000);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    map[key] = (map[key] || 0) + c.amount;
  });
  const sorted = Object.keys(map).sort();
  return { labels: sorted, values: sorted.map(k => map[k] / 100) };
}

function renderDashboard(days) {
  const filtered = filterByDays(allCharges, days);
  const totalCents = filtered.reduce((s, c) => s + c.amount, 0);
  const total = totalCents / 100;
  const quota = total * (CONFIG.quotaPct / 100);
  const count = filtered.reduce((s, c) => s + (c.quantity || 1), 0);
  const avg = filtered.length > 0 ? total / filtered.length : 0;

  const monthly = groupByMonth(filtered);

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const lineColor = isDark ? '#9FE1CB' : '#1a1a18';
  const fillColor = isDark ? 'rgba(159,225,203,0.12)' : 'rgba(26,26,24,0.07)';
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  const labelColor = isDark ? '#9a9893' : '#6b6a66';

  const container = document.getElementById('dashboard-content');
  container.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Totale incassato</div>
        <div class="metric-value">${formatAmount(totalCents)}</div>
        <div class="metric-sub">${filtered.length} pagamenti</div>
      </div>
      <div class="metric-card highlight">
        <div class="metric-label">Quota partner (${CONFIG.quotaPct}%)</div>
        <div class="metric-value">${formatAmount(quota * 100)}</div>
        <div class="metric-sub">su ${days} giorni</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Scontrino medio</div>
        <div class="metric-value">${formatAmount(avg * 100)}</div>
        <div class="metric-sub">per transazione</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">Andamento incassi per mese</div>
      <div style="position: relative; width: 100%; height: 220px;">
        <canvas id="revenue-chart"></canvas>
      </div>
    </div>

    <div class="table-section">
      <div class="table-header">Ultimi pagamenti</div>
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>ID</th>
            <th>Importo</th>
            <th>Stato</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.slice(0, 50).map(c => `
            <tr>
              <td>${formatDate(c.created)}</td>
              <td style="color: var(--text-muted); font-size: 11px;">${c.id}</td>
              <td>${formatAmount(c.amount, c.currency)}</td>
              <td><span class="${c.status === 'succeeded' ? 'badge-success' : 'badge-warn'}">${c.status}</span></td>
            </tr>
          `).join('')}
          ${filtered.length === 0 ? '<tr><td colspan="4" style="text-align:center; color: var(--text-muted); padding: 2rem;">Nessun pagamento trovato nel periodo</td></tr>' : ''}
        </tbody>
      </table>
    </div>
  `;

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  if (monthly.labels.length > 0) {
    chartInstance = new Chart(document.getElementById('revenue-chart'), {
      type: 'line',
      data: {
        labels: monthly.labels.map(l => {
          const [y, m] = l.split('-');
          return new Date(y, m-1).toLocaleDateString('it-IT', { month: 'short', year: '2-digit' });
        }),
        datasets: [{
          data: monthly.values,
          borderColor: lineColor,
          backgroundColor: fillColor,
          borderWidth: 1.5,
          pointRadius: 3,
          pointBackgroundColor: lineColor,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: {
            label: ctx => formatAmount(ctx.parsed.y * 100)
          }
        }},
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: labelColor, font: { family: 'Courier New', size: 11 } } },
          y: {
            grid: { color: gridColor },
            ticks: {
              color: labelColor,
              font: { family: 'Courier New', size: 11 },
              callback: v => formatAmount(v * 100)
            }
          }
        }
      }
    });
  }
}

function setPeriod(days, btn) {
  currentDays = days;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDashboard(days);
}

function resetConfig() {
  CONFIG = {};
  allCharges = [];
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  document.getElementById('setup-section').style.display = 'block';
  document.getElementById('dashboard-section').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('header-sub').textContent = '— configura l\'accesso per iniziare';
}
</script>
</body>
</html>
