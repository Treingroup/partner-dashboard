
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trein Group — Partner Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a1a;
    --surface: #232323;
    --surface2: #2c2c2c;
    --surface3: #333;
    --text: #f5f0e0;
    --text-muted: #9a9585;
    --border: rgba(255,255,255,0.08);
    --border-h: rgba(255,255,255,0.16);
    --accent: #e8c547;
    --accent-dim: rgba(232,197,71,0.13);
    --accent-b: rgba(232,197,71,0.3);
    --red: #f87171;
    --radius: 14px;
    --radius-sm: 8px;
  }
  body { font-family: Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,197,71,0.10) 0%, transparent 70%), var(--bg); }
  .login-box { width:100%; max-width:380px; }
  .brand-block { text-align:center; margin-bottom:2.5rem; }
  .brand-logo-img { height:56px; object-fit:contain; display:block; margin:0 auto 12px; }
  .brand-sub { font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; letter-spacing:3px; text-transform:uppercase; }
  .login-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:2rem; }
  .login-title { font-size:12px; font-weight:400; color:var(--text-muted); margin-bottom:1.5rem; font-family:Courier New,monospace; text-align:center; letter-spacing:1.5px; text-transform:uppercase; }
  .f-label { display:block; font-size:11px; color:var(--text-muted); margin-bottom:5px; font-family:Courier New,monospace; letter-spacing:1px; text-transform:uppercase; }
  .f-input { width:100%; padding:12px 14px; border:0.5px solid var(--border); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-size:15px; font-family:Courier New,monospace; outline:none; transition:border-color 0.2s; margin-bottom:1rem; }
  .f-input:focus { border-color:var(--accent); }
  .btn-accent { width:100%; padding:13px; background:var(--accent); color:#1a1a1a; border:none; border-radius:var(--radius-sm); font-size:15px; font-family:Georgia,serif; cursor:pointer; transition:opacity 0.15s; }
  .btn-accent:hover { opacity:0.88; }
  .login-error { background:rgba(248,113,113,0.10); border:0.5px solid rgba(248,113,113,0.25); color:var(--red); border-radius:var(--radius-sm); padding:10px 14px; font-size:13px; font-family:Courier New,monospace; margin-top:1rem; display:none; text-align:center; }
  .login-footer { text-align:center; margin-top:1.5rem; font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; opacity:0.4; letter-spacing:0.5px; }

  /* DASHBOARD */
  .dashboard { display:none; min-height:100vh; }
  .dash-header { padding:0.875rem 2rem; border-bottom:0.5px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:14px; }
  .dash-logo { height:28px; object-fit:contain; }
  .dash-sep { width:0.5px; height:20px; background:var(--border); }
  .dash-title { font-size:13px; color:var(--text-muted); font-family:Courier New,monospace; letter-spacing:0.5px; }
  .dash-actions { margin-left:auto; }
  .ghost-btn { background:none; border:0.5px solid var(--border); color:var(--text-muted); padding:5px 14px; border-radius:var(--radius-sm); font-size:11px; font-family:Courier New,monospace; cursor:pointer; transition:all 0.15s; letter-spacing:0.5px; }
  .ghost-btn:hover { border-color:var(--accent-b); color:var(--accent); }
  .dash-body { padding:1.5rem 2rem; }

  /* FILTER BAR */
  .filter-bar { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:0.875rem 1.25rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .filter-label { font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap; }
  .period-presets { display:flex; gap:6px; flex-wrap:wrap; }
  .period-btn { padding:5px 12px; border:0.5px solid var(--border); border-radius:20px; background:transparent; color:var(--text-muted); font-size:12px; cursor:pointer; font-family:Courier New,monospace; transition:all 0.15s; white-space:nowrap; }
  .period-btn:hover { border-color:var(--accent-b); color:var(--accent); }
  .period-btn.active { background:var(--accent); color:#1a1a1a; border-color:var(--accent); }
  .date-divider { width:0.5px; height:22px; background:var(--border); flex-shrink:0; }
  .date-range { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .date-sep { font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; }
  .date-range input[type="date"] { padding:5px 10px; border:0.5px solid var(--border); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-size:12px; font-family:Courier New,monospace; outline:none; cursor:pointer; transition:border-color 0.2s; }
  .date-range input[type="date"]:focus { border-color:var(--accent); }
  .apply-btn { padding:5px 14px; border:0.5px solid var(--accent-b); border-radius:var(--radius-sm); background:transparent; color:var(--accent); font-size:12px; font-family:Courier New,monospace; cursor:pointer; transition:all 0.15s; }
  .apply-btn:hover { background:var(--accent); color:#1a1a1a; }
  .product-badge { margin-left:auto; padding:4px 14px; background:var(--accent-dim); border:0.5px solid var(--accent-b); border-radius:20px; font-size:11px; color:var(--accent); font-family:Courier New,monospace; white-space:nowrap; letter-spacing:0.5px; }

  /* METRICS */
  .metrics-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-bottom:1.5rem; }
  .metric-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:1.35rem 1.5rem; }
  .metric-label { font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; letter-spacing:0.8px; text-transform:uppercase; margin-bottom:8px; }
  .metric-value { font-size:28px; font-weight:400; letter-spacing:-0.5px; color:var(--text); line-height:1; }
  .metric-card.highlight { border-color:var(--accent-b); background:var(--accent-dim); }
  .metric-card.highlight .metric-value { color:var(--accent); }
  .metric-sub { font-size:12px; color:var(--text-muted); margin-top:8px; font-family:Courier New,monospace; }

  /* CHART */
  .chart-section { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; }
  .section-title { font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:1rem; }

  /* TABLE */
  .table-section { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:2rem; }
  .table-header { padding:1rem 1.5rem; border-bottom:0.5px solid var(--border); font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; text-transform:uppercase; letter-spacing:0.8px; display:flex; align-items:center; justify-content:space-between; }
  .export-btn { padding:5px 12px; border:0.5px solid var(--border); border-radius:var(--radius-sm); background:transparent; color:var(--text-muted); font-size:11px; font-family:Courier New,monospace; cursor:pointer; transition:all 0.15s; }
  .export-btn:hover { border-color:var(--accent-b); color:var(--accent); }
  table { width:100%; border-collapse:collapse; }
  th { padding:10px 1.5rem; text-align:left; font-weight:400; color:var(--text-muted); font-family:Courier New,monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.6px; border-bottom:0.5px solid var(--border); }
  td { padding:12px 1.5rem; border-bottom:0.5px solid var(--border); color:var(--text); font-family:Courier New,monospace; font-size:13px; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }
  .empty-row td { text-align:center; color:var(--text-muted); padding:3rem; }
  .progress-wrap { display:none; }
  .progress-label { font-size:12px; color:var(--text-muted); font-family:Courier New,monospace; margin-bottom:8px; }
  .progress-bar { height:2px; background:var(--surface3); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.35s; width:0%; }
  .watermark { text-align:center; padding:1.5rem; font-size:11px; color:var(--text-muted); font-family:Courier New,monospace; opacity:0.3; letter-spacing:0.5px; }

  @media (max-width:700px) {
    .metrics-grid { grid-template-columns:1fr; }
    .dash-body { padding:1rem; }
    .filter-bar { gap:8px; }
    .date-divider { display:none; }
    .dash-header { padding:0.875rem 1rem; }
  }
</style>
</head>

<script>
/* ══ CONFIGURAZIONE ═══════════════════════════════════════════════════
   Apri questo file con un editor di testo e sostituisci
   INSERISCI_QUI_LA_KEY  con la tua nuova Restricted API Key Stripe
   ══════════════════════════════════════════════════════════════════ */
var STRIPE_KEY = 'INSERISCI_QUI_LA_KEY';
var PRODUCT_ID = 'prod_Tl9EOTfPa5x9Sx';
var QUOTA_PCT  = 20;
var PROD_LABEL = 'TREIN GROUP';
var PASSWORD   = 'AmbrosiTrein123!';
/* ═══════════════════════════════════════════════════════════════════ */

var allPayments = [];
var chartInst   = null;
var activeFrom  = null;
var activeTo    = null;

function doLogin() {
  if (document.getElementById('login-pw').value === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    document.getElementById('dash-subtitle').textContent  = PROD_LABEL + ' — Dashboard Partner';
    document.getElementById('product-badge').textContent  = PROD_LABEL;
    if (!allPayments.length) loadData();
  } else {
    var e = document.getElementById('login-error');
    e.style.display = 'block';
    document.getElementById('login-pw').value = '';
    setTimeout(function(){ e.style.display = 'none'; }, 2800);
  }
}

function doLogout() {
  document.getElementById('dashboard').style.display    = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').value = '';
}

function sg(path) {
  return fetch('https://api.stripe.com/v1/' + path, {
    headers: { 'Authorization': 'Bearer ' + STRIPE_KEY }
  }).then(function(r){ return r.json(); }).then(function(d){
    if (d.error) throw new Error(d.error.message);
    return d;
  });
}

function fetchAll(endpoint) {
  var acc = [];
  function go(sa) {
    var sep = endpoint.indexOf('?') !== -1 ? '&' : '?';
    var q   = sa ? endpoint+sep+'limit=100&starting_after='+sa : endpoint+sep+'limit=100';
    return sg(q).then(function(d){
      acc = acc.concat(d.data);
      if (d.has_more && d.data.length && acc.length < 3000) return go(d.data[d.data.length-1].id);
      return acc;
    });
  }
  return go(null);
}

function setP(pct, lbl) {
  var pw = document.getElementById('progress-wrap');
  var pf = document.getElementById('progress-fill');
  var pl = document.getElementById('progress-label');
  if (pw) pw.style.display = 'block';
  if (pf) pf.style.width   = pct + '%';
  if (pl) pl.textContent   = lbl;
}

function loadData() {
  document.getElementById('dash-content').innerHTML =
    '<div style="max-width:500px;margin:3rem auto;">' +
    '<div class="progress-wrap" id="progress-wrap" style="display:block">' +
    '<div class="progress-label" id="progress-label">Connessione a Stripe...</div>' +
    '<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>' +
    '</div></div>';

  var pricePromise = PRODUCT_ID.startsWith('price_')
    ? Promise.resolve([PRODUCT_ID])
    : fetchAll('prices?product=' + PRODUCT_ID).then(function(ps){ return ps.map(function(p){ return p.id; }); });

  pricePromise.then(function(pids) {
    if (!pids.length) throw new Error('Nessun prezzo trovato per questo prodotto.');
    setP(25, 'Ricerca fatture associate...');
    var invIds = {};
    var chain  = Promise.resolve();
    pids.forEach(function(pid, i) {
      chain = chain.then(function(){
        setP(25 + Math.round((i/pids.length)*35), 'Analisi prezzo '+(i+1)+' di '+pids.length+'...');
        return fetchAll('invoice_items?price=' + pid).then(function(items){
          items.forEach(function(item){
            if (item.invoice) {
              var id = typeof item.invoice === 'string' ? item.invoice : item.invoice.id;
              invIds[id] = true;
            }
          });
        }).catch(function(){});
      });
    });

    return chain.then(function(){
      var ids = Object.keys(invIds);
      setP(62, 'Recupero ' + ids.length + ' fatture...');
      var payments = [];
      var ic = Promise.resolve();
      ids.forEach(function(invId, i){
        ic = ic.then(function(){
          if (i%5===0) setP(62+Math.round((i/Math.max(ids.length,1))*30), 'Fattura '+(i+1)+' di '+ids.length+'...');
          return sg('invoices/' + invId).then(function(inv){
            if (inv.status==='paid' && inv.amount_paid > 0) {
              payments.push({
                id: inv.id,
                date: (inv.status_transitions && inv.status_transitions.paid_at) ? inv.status_transitions.paid_at : inv.created,
                amount: inv.amount_paid,
                currency: (inv.currency || 'eur').toUpperCase(),
                description: inv.number || inv.id
              });
            }
          }).catch(function(){});
        });
      });

      return ic.then(function(){
        if (!payments.length) {
          setP(80, 'Analisi pagamenti diretti...');
          return fetchAll('charges').then(function(charges){
            charges.forEach(function(c){
              if (c.status !== 'succeeded') return;
              var vals = Object.values(c.metadata||{}).map(function(v){ return String(v); });
              if (vals.indexOf(PRODUCT_ID) !== -1 || pids.some(function(pid){ return vals.indexOf(pid) !== -1; })) {
                payments.push({ id: c.id, date: c.created, amount: c.amount, currency: (c.currency||'eur').toUpperCase(), description: c.description || c.id });
              }
            });
            return payments;
          });
        }
        return payments;
      });
    });

  }).then(function(payments){
    setP(100, 'Completato!');
    allPayments = payments.sort(function(a,b){ return b.date - a.date; });
    var today = new Date();
    document.getElementById('date-to').value = today.toISOString().split('T')[0];
    if (allPayments.length) {
      var oldest = new Date(Math.min.apply(null, allPayments.map(function(p){ return p.date*1000; })));
      document.getElementById('date-from').value = oldest.toISOString().split('T')[0];
    }
    setTimeout(renderDashboard, 300);
  }).catch(function(e){
    document.getElementById('dash-content').innerHTML =
      '<div style="max-width:500px;margin:3rem auto;padding:1.25rem;background:rgba(248,113,113,0.10);border:0.5px solid rgba(248,113,113,0.25);border-radius:8px;color:#f87171;font-family:Courier New,monospace;font-size:13px;">Errore: ' + e.message + '</div>';
  });
}

function setPreset(days, btn) {
  document.querySelectorAll('.period-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if (days >= 9999) {
    activeFrom = null; activeTo = null;
    if (allPayments.length) {
      document.getElementById('date-from').value = new Date(Math.min.apply(null, allPayments.map(function(p){ return p.date*1000; }))).toISOString().split('T')[0];
    }
    document.getElementById('date-to').value = new Date().toISOString().split('T')[0];
  } else {
    var to = new Date(), from = new Date(to.getTime()-days*86400000);
    activeFrom = from.getTime()/1000; activeTo = to.getTime()/1000;
    document.getElementById('date-from').value = from.toISOString().split('T')[0];
    document.getElementById('date-to').value   = to.toISOString().split('T')[0];
  }
  renderDashboard();
}

function applyRange() {
  document.querySelectorAll('.period-btn').forEach(function(b){ b.classList.remove('active'); });
  var fv = document.getElementById('date-from').value;
  var tv = document.getElementById('date-to').value;
  if (!fv||!tv) { alert('Seleziona entrambe le date.'); return; }
  var from = new Date(fv), to = new Date(tv);
  to.setHours(23,59,59);
  if (from > to) { alert('La data iniziale deve precedere quella finale.'); return; }
  activeFrom = from.getTime()/1000; activeTo = to.getTime()/1000;
  renderDashboard();
}

function getFiltered() {
  return allPayments.filter(function(p){
    return (!activeFrom||p.date>=activeFrom) && (!activeTo||p.date<=activeTo);
  });
}

function fmt(cents, cur) {
  return new Intl.NumberFormat('it-IT',{style:'currency',currency:cur||'EUR'}).format(cents/100);
}
function fmtDate(ts) {
  return new Date(ts*1000).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function groupByMonth(pays) {
  var m = {};
  pays.forEach(function(p){
    var d = new Date(p.date*1000);
    var k = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    m[k] = (m[k]||0) + p.amount;
  });
  var s = Object.keys(m).sort();
  return { labels: s, values: s.map(function(k){ return m[k]/100; }) };
}
function periodLabel() {
  if (!activeFrom&&!activeTo) return 'tutto il periodo';
  return fmtDate(activeFrom||0) + '  →  ' + (activeTo?fmtDate(activeTo):'oggi');
}
function exportCSV() {
  var f = getFiltered();
  var rows = [['Data','Riferimento','Importo EUR','Quota '+QUOTA_PCT+'%']];
  f.forEach(function(p){ rows.push([fmtDate(p.date),p.description,(p.amount/100).toFixed(2),(p.amount*QUOTA_PCT/100/100).toFixed(2)]); });
  var csv  = rows.map(function(r){ return r.join(';'); }).join('\n');
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a'); a.href=url; a.download='trein-partner-report.csv'; a.click();
  URL.revokeObjectURL(url);
}

function renderDashboard() {
  var f          = getFiltered();
  var totalCents = f.reduce(function(s,p){ return s+p.amount; },0);
  var quota      = Math.round(totalCents*QUOTA_PCT/100);
  var avg        = f.length ? Math.round(totalCents/f.length) : 0;
  var monthly    = groupByMonth(f);
  var cur        = f.length ? f[0].currency : 'EUR';
  var lc='#e8c547', fc='rgba(232,197,71,0.08)', gc='rgba(255,255,255,0.05)', tc='#9a9585';

  var rows = !f.length
    ? '<tr class="empty-row"><td colspan="4">Nessun pagamento nel periodo selezionato</td></tr>'
    : f.slice(0,200).map(function(p){
        return '<tr><td>'+fmtDate(p.date)+'</td><td style="font-size:11px;color:var(--text-muted);">'+p.description+'</td><td>'+fmt(p.amount,p.currency)+'</td><td style="color:var(--accent);">'+fmt(Math.round(p.amount*QUOTA_PCT/100),p.currency)+'</td></tr>';
      }).join('');

  document.getElementById('dash-content').innerHTML =
    '<div class="metrics-grid">'+
      '<div class="metric-card"><div class="metric-label">Totale incassato</div><div class="metric-value">'+fmt(totalCents,cur)+'</div><div class="metric-sub">'+f.length+' pagamenti · '+periodLabel()+'</div></div>'+
      '<div class="metric-card highlight"><div class="metric-label">Quota partner ('+QUOTA_PCT+'%)</div><div class="metric-value">'+fmt(quota,cur)+'</div><div class="metric-sub">Importo da liquidare</div></div>'+
      '<div class="metric-card"><div class="metric-label">Valore medio</div><div class="metric-value">'+fmt(avg,cur)+'</div><div class="metric-sub">per transazione</div></div>'+
    '</div>'+
    '<div class="chart-section"><div class="section-title">Andamento mensile</div><div style="position:relative;width:100%;height:210px;"><canvas id="rc"></canvas></div></div>'+
    '<div class="table-section">'+
      '<div class="table-header"><span>Pagamenti ('+f.length+')</span><button class="export-btn" onclick="exportCSV()">↓ Esporta CSV</button></div>'+
      '<table><thead><tr><th>Data</th><th>Riferimento</th><th>Importo</th><th>Quota '+QUOTA_PCT+'%</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '</div>'+
    '<div class="watermark">Trein Group Srl · treingroup.it · Dati in tempo reale da Stripe</div>';

  if (chartInst) { chartInst.destroy(); chartInst=null; }
  if (monthly.labels.length) {
    chartInst = new Chart(document.getElementById('rc'),{
      type:'line',
      data:{
        labels:monthly.labels.map(function(l){ var p=l.split('-'); return new Date(p[0],p[1]-1).toLocaleDateString('it-IT',{month:'short',year:'2-digit'}); }),
        datasets:[{data:monthly.values,borderColor:lc,backgroundColor:fc,borderWidth:1.5,pointRadius:3,pointBackgroundColor:lc,fill:true,tension:0.35}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return fmt(ctx.parsed.y*100,cur);}}}},
        scales:{
          x:{grid:{color:gc},ticks:{color:tc,font:{family:'Courier New',size:11}}},
          y:{grid:{color:gc},ticks:{color:tc,font:{family:'Courier New',size:11},callback:function(v){return fmt(v*100,cur);}}}
        }
      }
    });
  }
}
</script>
</body>
</html>
